      - type: file
        url: https://files.pythonhosted.org/packages/88/ef/eb23f262cca3c0c4eb7ab1933c3b1f03d021f2c48f54763065b6f0e321be/packaging-24.2-py3-none-any.whl
        sha256: 09abb1bccd265c01f4a3aa3f7a7db064b36514d2cba19a2f694fe6150451a759
        x-checker-data:
          type: pypi
          name: packaging
          packagetype: bdist_wheel
      - type: file
        url: https://files.pythonhosted.org/packages/62/9a/78122735697dbfc6c1db363627309eb0da7e44d8c05ba017b08666530586/sip-6.10.0.tar.gz
        sha256: fa0515697d4c98dbe04d9e898d816de1427e5b9ae5d0e152169109fd21f5d29c
        x-checker-data:
          type: pypi
          name: sip
      - type: file
        url: https://files.pythonhosted.org/packages/a7/c8/027cb80c99de9bb64aafcf3f5d67c128523e0af08edf18987ea8eb5c4be9/PyQt_builder-1.18.1-py3-none-any.whl
        sha256: 59ba2b1df2692986f3b3d3ba7395a6476c54cab0cc0ece18030ffba574657afc
        x-checker-data:
          type: pypi
          name: PyQt-builder
          packagetype: bdist_wheel

  - name: python3-PyQt5-sip
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} "PyQt5-sip" --no-build-isolation
    sources:
      - type: file
